<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMK Foundation - Loan Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .login-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .role-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }

        .role-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 16px;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .role-tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .role-tab:hover {
            color: #667eea;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .password-field {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 38px;
            cursor: pointer;
            color: #999;
            font-size: 18px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .checkbox-group input {
            width: auto;
            margin: 0;
        }

        .checkbox-group label {
            margin: 0;
            font-size: 13px;
            color: #666;
        }

        .forgot-link {
            text-align: right;
            margin-bottom: 20px;
        }

        .forgot-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 13px;
        }

        .forgot-link a:hover {
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .error-message {
            background-color: #fee;
            color: #c33;
            padding: 12px 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            border-left: 4px solid #c33;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .success-message {
            background-color: #efe;
            color: #3c3;
            padding: 12px 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            border-left: 4px solid #3c3;
        }

        .success-message.show {
            display: block;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            color: #999;
            font-size: 13px;
        }

        .init-section {
            display: none;
        }

        .init-section.show {
            display: block;
        }

        .init-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #666;
        }

        .init-link a {
            color: #667eea;
            cursor: pointer;
            text-decoration: underline;
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">💰</div>
            <h1>DMK Foundation</h1>
            <p>Loan Management System</p>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <!-- Login Section -->
        <div id="loginSection">
            <div class="role-tabs">
                <button class="role-tab active" onclick="switchRole('admin')">Admin Login</button>
                <button class="role-tab" onclick="switchRole('staff')">Staff Login</button>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="userId">Admin ID</label>
                    <input type="text" id="userId" name="userId" placeholder="Enter your ID" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-field">
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                        <span class="toggle-password" onclick="togglePassword()">👁️</span>
                    </div>
                </div>

                <div id="rememberMeContainer" class="checkbox-group">
                    <input type="checkbox" id="rememberMe" name="rememberMe">
                    <label for="rememberMe">Remember me</label>
                </div>

                <div id="forgotPasswordContainer" class="forgot-link">
                    <a href="#" onclick="showForgotPassword(event)">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn">Login</button>
            </form>

            <div class="init-link">
                Don't have an account? <a onclick="showInitAdmin()">Initialize Admin</a>
            </div>
        </div>

        <!-- Initialize Admin Section -->
        <div id="initAdminSection" class="init-section">
            <h2 style="text-align: center; margin-bottom: 20px; color: #333;">Create First Admin</h2>
            <form id="initAdminForm" onsubmit="handleInitAdmin(event)">
                <div class="form-group">
                    <label for="adminUsername">Username</label>
                    <input type="text" id="adminUsername" name="adminUsername" placeholder="Enter username" required>
                </div>

                <div class="form-group">
                    <label for="adminEmail">Email</label>
                    <input type="email" id="adminEmail" name="adminEmail" placeholder="Enter email" required>
                </div>

                <div class="form-group">
                    <label for="adminPassword">Password</label>
                    <input type="password" id="adminPassword" name="adminPassword" placeholder="At least 8 characters" required>
                </div>

                <div class="form-group">
                    <label for="adminConfirmPassword">Confirm Password</label>
                    <input type="password" id="adminConfirmPassword" name="adminConfirmPassword" placeholder="Confirm password" required>
                </div>

                <button type="submit" class="login-btn">Create Admin Account</button>
            </form>

            <div class="init-link">
                Already have an account? <a onclick="showLogin()">Back to Login</a>
            </div>
        </div>

        <!-- Forgot Password Section -->
        <div id="forgotPasswordSection" class="init-section">
            <h2 style="text-align: center; margin-bottom: 20px; color: #333;">Reset Password</h2>
            <form id="forgotPasswordForm" onsubmit="handleForgotPassword(event)">
                <div class="form-group">
                    <label for="resetEmail">Email Address</label>
                    <input type="email" id="resetEmail" name="resetEmail" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="resetRole">Login Type</label>
                    <select id="resetRole" name="resetRole" style="width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 5px; font-size: 14px;" required>
                        <option value="admin">Admin</option>
                        <option value="staff">Staff</option>
                    </select>
                </div>

                <button type="submit" class="login-btn">Send Reset Link</button>
            </form>

            <div class="init-link">
                <a onclick="showLogin()">Back to Login</a>
            </div>
        </div>

        <div class="footer-text">
            © 2026 DMK Foundation. Internal Use Only.
        </div>
    </div>

    <script>
        let currentRole = 'admin';

        function switchRole(role) {
            currentRole = role;
            document.querySelectorAll('.role-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            
            const userIdInput = document.getElementById('userId');
            const rememberContainer = document.getElementById('rememberMeContainer');
            
            if (role === 'admin') {
                userIdInput.placeholder = 'Enter Admin ID';
                rememberContainer.style.display = 'flex';
            } else {
                userIdInput.placeholder = 'Enter Staff ID';
                rememberContainer.style.display = 'none';
            }
        }

        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.querySelector('.toggle-password');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = '👁️‍🗨️';
            } else {
                input.type = 'password';
                icon.textContent = '👁️';
            }
        }

        function showMessage(message, type = 'error') {
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            
            if (type === 'error') {
                errorDiv.textContent = message;
                errorDiv.classList.add('show');
                successDiv.classList.remove('show');
            } else {
                successDiv.textContent = message;
                successDiv.classList.add('show');
                errorDiv.classList.remove('show');
            }
            
            setTimeout(() => {
                errorDiv.classList.remove('show');
                successDiv.classList.remove('show');
            }, 5000);
        }

        async function handleLogin(event) {
            event.preventDefault();
            const userId = document.getElementById('userId').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const btn = event.target.querySelector('button');

            btn.classList.add('loading');
            btn.textContent = 'Logging in...';

            try {
                const endpoint = currentRole === 'admin' ? '/api/auth/admin-login' : '/api/auth/staff-login';
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        adminId: currentRole === 'admin' ? userId : undefined,
                        staffId: currentRole === 'staff' ? userId : undefined,
                        password,
                        rememberMe
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage(`Welcome ${data.data.username}!`, 'success');
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 1500);
                } else {
                    showMessage(data.message || 'Login failed');
                }
            } catch (error) {
                showMessage('Connection error. Please try again.');
            } finally {
                btn.classList.remove('loading');
                btn.textContent = currentRole === 'admin' ? 'Admin Login' : 'Staff Login';
            }
        }

        async function handleInitAdmin(event) {
            event.preventDefault();
            const username = document.getElementById('adminUsername').value;
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            const confirmPassword = document.getElementById('adminConfirmPassword').value;
            const btn = event.target.querySelector('button');

            if (password !== confirmPassword) {
                showMessage('Passwords do not match');
                return;
            }

            btn.classList.add('loading');
            btn.textContent = 'Creating...';

            try {
                const response = await fetch('/api/auth/initialize-admin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password, confirmPassword })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('Admin account created successfully!', 'success');
                    setTimeout(() => {
                        showLogin();
                        document.getElementById('userId').value = data.data.adminId;
                    }, 1500);
                } else {
                    showMessage(data.message || 'Failed to create admin');
                }
            } catch (error) {
                showMessage('Connection error. Please try again.');
            } finally {
                btn.classList.remove('loading');
                btn.textContent = 'Create Admin Account';
            }
        }

        async function handleForgotPassword(event) {
            event.preventDefault();
            const email = document.getElementById('resetEmail').value;
            const role = document.getElementById('resetRole').value;
            const btn = event.target.querySelector('button');

            btn.classList.add('loading');
            btn.textContent = 'Sending...';

            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, role })
                });

                const data = await response.json();
                showMessage('Check your email for password reset instructions', 'success');
                
                setTimeout(() => {
                    showLogin();
                }, 2000);
            } catch (error) {
                showMessage('Connection error. Please try again.');
            } finally {
                btn.classList.remove('loading');
                btn.textContent = 'Send Reset Link';
            }
        }

        function showInitAdmin() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('initAdminSection').classList.add('show');
            document.getElementById('forgotPasswordSection').classList.remove('show');
        }

        function showLogin() {
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('initAdminSection').classList.remove('show');
            document.getElementById('forgotPasswordSection').classList.remove('show');
        }

        function showForgotPassword(event) {
            event.preventDefault();
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('initAdminSection').classList.remove('show');
            document.getElementById('forgotPasswordSection').classList.add('show');
        }
    </script>
</body>
</html>
